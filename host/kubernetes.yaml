---

kind: ClusterIssuer
apiVersion: cert-manager.io/v1
metadata:
  name: letsencrypt
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: stephan.zlatarev@sap.com
    privateKeySecretRef:
      name: letsencrypt
    solvers:
      - http01:
          ingress:
            class: nginx

---

kind: Ingress
apiVersion: networking.k8s.io/v1
metadata:
  name: www
  annotations:
    kubernetes.io/ingress.class: "nginx"
    cert-manager.io/cluster-issuer: "letsencrypt"
spec:
  rules:
    - host: match.superskill.me
      http:
       paths:
         - path: /
           pathType: Prefix
           backend:
             service:
               name: sc-vs-bot-host
               port:
                 number: 8000
  tls:
    - hosts:
        - match.superskill.me
      secretName: ingress-www

---

kind: Service
apiVersion: v1
metadata:
  name: sc-vs-bot-host-lb
spec:
  type: LoadBalancer
  selector:
    module: sc-vs-bot-host
  ports:
    - name: tcp-10044
      port: 10044
      targetPort: 10044
      protocol: TCP
    - name: tcp-10055
      port: 10055
      targetPort: 10055
      protocol: TCP

---

kind: Service
apiVersion: v1
metadata:
  name: sc-vs-bot-host
spec:
  selector:
    module: sc-vs-bot-host
  ports:
    - name: http
      port: 8000
      targetPort: 8000

---

kind: Deployment
apiVersion: apps/v1
metadata:
  name: sc-vs-bot-host
  labels:
    module: sc-vs-bot-host
spec:
  selector:
    matchLabels:
      module: sc-vs-bot-host
  template:
    metadata:
      labels:
        module: sc-vs-bot-host
    spec:
      containers:
        - name: sc-vs-bot-host
          image: docker.io/stephanzlatarev/sc-vs-bot-host
          ports:
            - containerPort: 8000
            - containerPort: 10044
            - containerPort: 10055

---
